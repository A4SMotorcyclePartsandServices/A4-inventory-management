{% extends "base.html" %}

{% block styles %}
<style>
    /* Centers the login card on the screen */
.login-container {
        display: flex;
        justify-content: center;
        align-items: center;
        /* Increased height to center it better now that nav is gone */
        min-height: 75vh; 
    }

    .login-card {
        background-color: #1e1e1e;
        border: 1px solid #333;
        border-top: 4px solid #e63946;
        padding: 2.5rem;
        border-radius: 12px;
        width: 100%;
        max-width: 400px;
        box-shadow: 0 15px 35px rgba(0,0,0,0.7);
    }

    .login-card h2 {
        color: #e63946;
        font-weight: bold;
        text-align: center;
        margin-bottom: 1.5rem;
    }

    .btn-login {
        width: 100%;
        font-weight: bold;
        text-transform: uppercase;
        letter-spacing: 1px;
        padding: 0.75rem;
    }

    /* Force the font size so the browser doesn't guess */
    .form-control-lg {
        font-size: 1.1rem !important; 
    }

    .password-field {
        position: relative;
    }

    .password-field .form-control {
        padding-right: 3.25rem;
    }

    .password-toggle {
        position: absolute;
        top: 50%;
        right: 0.85rem;
        transform: translateY(-50%);
        border: 0;
        background: transparent;
        color: #bbb;
        font-size: 1.2rem;
        line-height: 1;
        padding: 0.35rem;
    }

    .password-toggle:hover,
    .password-toggle:focus {
        color: #fff;
        outline: none;
    }

    /* Fix for Browser Autofill "jumping" and background color changes */
    input:-webkit-autofill,
    input:-webkit-autofill:hover, 
    input:-webkit-autofill:focus, 
    input:-webkit-autofill:active {
        -webkit-box-shadow: 0 0 0 30px #1e1e1e inset !important; /* Matches your card color */
        -webkit-text-fill-color: white !important;
        transition: background-color 5000s ease-in-out 0s;
    }

    /* Ensure no weird scaling on interaction */
    .form-control:focus {
        background-color: #1e1e1e;
        color: white;
        border-color: #e63946;
        box-shadow: 0 0 0 0.25rem rgba(230, 57, 70, 0.25);
    }
</style>
{% endblock %}

{% block content %}
<div class="login-container">
    <div class="login-card">
        <h2><i class="bi bi-lock-fill"></i> Login</h2>
        
        <form method="post" id="loginForm">
            <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
            <div class="mb-3">
                <label class="form-label">Username</label>
                <input name="username" class="form-control form-control-lg" placeholder="Enter username" required autofocus>
            </div>
            
            <div class="mb-4">
                <label class="form-label">Password</label>
                <div class="password-field">
                    <input id="passwordInput" name="password" type="password" class="form-control form-control-lg" placeholder="Enter password" required>
                    <button type="button" class="password-toggle" id="passwordToggle" aria-label="Show password" aria-pressed="false">
                        <i class="bi bi-eye-fill" aria-hidden="true"></i>
                    </button>
                </div>
            </div>
            
            <button type="submit" class="btn btn-danger btn-login">
                Sign In
            </button>
        </form>
        <div class="text-center mt-3">
            <a href="{{ url_for('password_reset.forgot_password') }}" class="text-decoration-none text-warning small">
                Forgot password?
            </a>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', function () {
    const passwordInput = document.getElementById('passwordInput');
    const passwordToggle = document.getElementById('passwordToggle');

    if (passwordInput && passwordToggle) {
        const toggleIcon = passwordToggle.querySelector('i');

        passwordToggle.addEventListener('click', function () {
            const shouldShowPassword = passwordInput.type === 'password';

            passwordInput.type = shouldShowPassword ? 'text' : 'password';
            passwordToggle.setAttribute('aria-label', shouldShowPassword ? 'Hide password' : 'Show password');
            passwordToggle.setAttribute('aria-pressed', String(shouldShowPassword));
            toggleIcon.classList.toggle('bi-eye-fill', !shouldShowPassword);
            toggleIcon.classList.toggle('bi-eye-slash-fill', shouldShowPassword);
        });
    }

    const loginForm = document.getElementById('loginForm');
    if (!loginForm || !window.A4Submit?.createFormGuard) {
        return;
    }

    const submitButton = loginForm.querySelector('button[type="submit"]');
    const guard = window.A4Submit.createFormGuard(loginForm, {
        submitButton,
        loadingHtml: 'Signing In...',
    });

    loginForm.addEventListener('submit', function (event) {
        if (!guard.begin()) {
            event.preventDefault();
        }
    });
});
</script>
{% endblock %}
