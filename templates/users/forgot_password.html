{% extends "base.html" %}

{% block styles %}
<style>
.login-container {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 75vh;
}

.login-card {
    background-color: #1e1e1e;
    border: 1px solid #333;
    border-top: 4px solid #e63946;
    padding: 2.5rem;
    border-radius: 12px;
    width: 100%;
    max-width: 460px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.7);
}

.login-card h2 {
    color: #e63946;
    font-weight: bold;
    text-align: center;
    margin-bottom: 1.5rem;
}

.btn-login {
    width: 100%;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 0.75rem;
}
</style>
{% endblock %}

{% block content %}
<div class="login-container">
    <div class="login-card">
        <h2><i class="bi bi-key-fill"></i> Forgot Password</h2>
        <p class="text-white-50 mb-4 small">
            Staff accounts only. If the account is eligible, an administrator will be notified to reset the password.
        </p>

        <form method="post">
            <div class="mb-3">
                <label class="form-label">Username</label>
                <input name="username" class="form-control form-control-lg" placeholder="Enter your username" required autofocus>
            </div>

            <div class="mb-4">
                <label class="form-label">Optional note</label>
                <textarea name="request_note" class="form-control" rows="3" placeholder="Add context for the admin if needed"></textarea>
            </div>

            <button type="submit" class="btn btn-danger btn-login mb-3">
                Request Password Reset
            </button>

            <a href="{{ url_for('auth.login') }}" class="btn btn-outline-secondary w-100">
                Back to Login
            </a>
        </form>
    </div>
</div>
{% endblock %}
