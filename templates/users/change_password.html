{% extends "base.html" %}

{% block styles %}
<style>
.login-container {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 75vh;
}

.login-card {
    background-color: #1e1e1e;
    border: 1px solid #333;
    border-top: 4px solid #e63946;
    padding: 2.5rem;
    border-radius: 12px;
    width: 100%;
    max-width: 460px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.7);
}

.login-card h2 {
    color: #e63946;
    font-weight: bold;
    text-align: center;
    margin-bottom: 1.5rem;
}

.btn-login {
    width: 100%;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 0.75rem;
}
</style>
{% endblock %}

{% block content %}
<div class="login-container">
    <div class="login-card">
        <h2><i class="bi bi-shield-lock-fill"></i> Change Password</h2>
        {% if force_change %}
        <p class="text-warning small mb-4">
            Your password was reset by an administrator. You must set a new password before continuing.
        </p>
        {% endif %}

        <form method="post">
            <div class="mb-3">
                <label class="form-label">Current Password</label>
                <input name="current_password" type="password" class="form-control form-control-lg" required autofocus>
            </div>
            <div class="mb-3">
                <label class="form-label">New Password</label>
                <input name="new_password" type="password" class="form-control form-control-lg" required>
            </div>
            <div class="mb-4">
                <label class="form-label">Confirm New Password</label>
                <input name="confirm_password" type="password" class="form-control form-control-lg" required>
            </div>

            <button type="submit" class="btn btn-danger btn-login">
                Update Password
            </button>
        </form>
    </div>
</div>
{% endblock %}
