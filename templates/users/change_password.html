{% extends "base.html" %}

{% block styles %}
<style>
.login-container {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 75vh;
}

.login-card {
    background-color: #1e1e1e;
    border: 1px solid #333;
    border-top: 4px solid #e63946;
    padding: 2.5rem;
    border-radius: 12px;
    width: 100%;
    max-width: 460px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.7);
}

.login-card h2 {
    color: #e63946;
    font-weight: bold;
    text-align: center;
    margin-bottom: 1.5rem;
}

.btn-login {
    width: 100%;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 0.75rem;
}

.password-field {
    position: relative;
}

.password-field .form-control {
    padding-right: 3.25rem;
}

.password-toggle {
    position: absolute;
    top: 50%;
    right: 0.85rem;
    transform: translateY(-50%);
    border: 0;
    background: transparent;
    color: #bbb;
    font-size: 1.2rem;
    line-height: 1;
    padding: 0.35rem;
}

.password-toggle:hover,
.password-toggle:focus {
    color: #fff;
    outline: none;
}
</style>
{% endblock %}

{% block content %}
<div class="login-container">
    <div class="login-card">
        <h2><i class="bi bi-shield-lock-fill"></i> Change Password</h2>
        {% if force_change %}
        <p class="text-warning small mb-4">
            You are signed in with a temporary or administrator-set password. You must set a new password before continuing.
        </p>
        {% endif %}

        <form method="post">
            <div class="mb-3">
                <label class="form-label">Current Password</label>
                <div class="password-field">
                    <input id="currentPasswordInput" name="current_password" type="password" class="form-control form-control-lg" required autofocus>
                    <button type="button" class="password-toggle" data-password-toggle="currentPasswordInput" aria-label="Show current password" aria-pressed="false">
                        <i class="bi bi-eye-fill" aria-hidden="true"></i>
                    </button>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">New Password</label>
                <div class="password-field">
                    <input id="newPasswordInput" name="new_password" type="password" class="form-control form-control-lg" required>
                    <button type="button" class="password-toggle" data-password-toggle="newPasswordInput" aria-label="Show new password" aria-pressed="false">
                        <i class="bi bi-eye-fill" aria-hidden="true"></i>
                    </button>
                </div>
            </div>
            <div class="mb-4">
                <label class="form-label">Confirm New Password</label>
                <div class="password-field">
                    <input id="confirmPasswordInput" name="confirm_password" type="password" class="form-control form-control-lg" required>
                    <button type="button" class="password-toggle" data-password-toggle="confirmPasswordInput" aria-label="Show confirm password" aria-pressed="false">
                        <i class="bi bi-eye-fill" aria-hidden="true"></i>
                    </button>
                </div>
            </div>

            <button type="submit" class="btn btn-danger btn-login">
                Update Password
            </button>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', function () {
    document.querySelectorAll('[data-password-toggle]').forEach(function (toggleButton) {
        const passwordInput = document.getElementById(toggleButton.dataset.passwordToggle);
        const toggleIcon = toggleButton.querySelector('i');

        if (!passwordInput || !toggleIcon) {
            return;
        }

        const labelPrefix = toggleButton.getAttribute('aria-label').replace(/^Show\s+|^Hide\s+/, '');

        toggleButton.addEventListener('click', function () {
            const shouldShowPassword = passwordInput.type === 'password';

            passwordInput.type = shouldShowPassword ? 'text' : 'password';
            toggleButton.setAttribute('aria-label', `${shouldShowPassword ? 'Hide' : 'Show'} ${labelPrefix}`);
            toggleButton.setAttribute('aria-pressed', String(shouldShowPassword));
            toggleIcon.classList.toggle('bi-eye-fill', !shouldShowPassword);
            toggleIcon.classList.toggle('bi-eye-slash-fill', shouldShowPassword);
        });
    });
});
</script>
{% endblock %}
